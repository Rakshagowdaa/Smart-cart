server.port=8083

spring.application.name=PRODUCT-SERVICE

spring.datasource.url=jdbc:mysql://localhost:3306/smartcart_product_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (auto create/update tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# \u2705 Automatically run data.sql on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.platform=mysql

# Eureka
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Custom Swagger Servers for professional API documentation
springdoc.openapi.servers[0].url=http://localhost:8080
springdoc.openapi.servers[0].description=API Gateway Router (Routed Path: /api/products)
springdoc.openapi.servers[1].url=http://localhost:8083
springdoc.openapi.servers[1].description=Product Service (Direct Local Server)