server.port=8082

spring.application.name=USER-SERVICE
spring.datasource.url=jdbc:mysql://localhost:3306/smartcart_user_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Custom Swagger Servers for professional API documentation
springdoc.openapi.servers[0].url=http://localhost:8080
springdoc.openapi.servers[0].description=API Gateway Router (Routed Path: /api/users)
springdoc.openapi.servers[1].url=http://localhost:8082
springdoc.openapi.servers[1].description=User Service (Direct Local Server)

